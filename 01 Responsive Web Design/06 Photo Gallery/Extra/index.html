<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f6f7;
      }
      .header {
        text-align: center;
        text-transform: uppercase;
        padding: 32px;
        background-color: #0a0a23;
        color: #fff;
        border-bottom: 4px solid #fdb347;
      }
      .gallery {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 16px;
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px 10px;
      }
      .gallery img {
        width: 100%;
        max-width: 350px;
        height: 300px;
        object-fit: cover;
        border-radius: 10px;
      }
      .gallery::after {
        content: "";
        width: 350px;
      }
      .popup {
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        justify-content: center;
        align-items: center;
        display: none;
      }
      .popup-content {
        position: relative;
        padding: 20px;
        width: 80%;
        max-width: 700px;
        max-height: 90vh; /* não ultrapassa 90% da altura da tela */
        overflow-y: auto; /* permite rolar se o conteúdo for muito alto */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        background: #fff;
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .popup-content img {
        width: auto;
        max-width: 100%; /* faz a imagem se ajustar ao largura do contentor */
        height: auto;
        max-height: 70vh; /* limita a altura da imagem para ficar bem no popup */
        margin-top: 20px; /* espaço acima da imagem */
      }

      .close {
        position: absolute;
        top: 10px;
        right: 20px;
        font-size: 30px;
        font-weight: bold;
        color: #333;
        cursor: pointer;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h1>css flexbox photo gallery</h1>
    </header>
    <div class="gallery">
      <!-- Images sourced from freeCodeCamp for example purposes -->
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/1.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/2.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/3.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/4.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/5.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/6.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/7.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/8.jpg"
      />
      <img
        src="https://cdn.freecodecamp.org/curriculum/css-photo-gallery/9.jpg"
      />
    </div>
    <div id="popup" class="popup">
      <div class="popup-content">
        <span class="close">&times;</span>
        <img id="popup-img" src="" alt="Popup Image" />
        <p id="popup-text">Descrição da imagem aqui</p>
      </div>
    </div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const images = document.querySelectorAll(".gallery img")
        const popup = document.getElementById("popup")
        const popupImg = document.getElementById("popup-img")
        const popupText = document.getElementById("popup-text")
        const closeBtn = document.querySelector(".close")

        images.forEach((image) => {
          image.addEventListener("click", function () {
            popup.style.display = "flex"
            popupImg.src = this.src
            popupText.textContent = "Descrição da imagem aqui" // Você pode adicionar descrições específicas para cada imagem, se necessário
          })
        })

        closeBtn.addEventListener("click", function () {
          popup.style.display = "none"
        })
      })
    </script>
  </body>
</html>
